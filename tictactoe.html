<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #controls {
      margin-top: 1.8rem;
      display: flex;
      gap: 1rem;
    }

    button {
      padding: 0.6rem 1.6rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }

    #restart { background: #e94560; color: #fff; }

    #mode-toggle {
      background: #0f3460;
      color: #a8dadc;
      border: 1px solid #a8dadc55;
    }

    #mode-toggle.active {
      background: #a8dadc;
      color: #1a1a2e;
    }

    #score {
      margin-top: 1.4rem;
      display: flex;
      gap: 2rem;
      font-size: 1rem;
      color: #888;
    }

    #score span { text-align: center; }
    #score strong { display: block; font-size: 1.5rem; color: #eee; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">X's turn</div>
  <div id="board"></div>
  <div id="controls">
    <button id="restart">Restart</button>
    <button id="mode-toggle">vs CPU: OFF</button>
  </div>
  <div id="score">
    <span><strong id="score-x">0</strong> X</span>
    <span><strong id="score-draw">0</strong> Draw</span>
    <span><strong id="score-o">0</strong> O</span>
  </div>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    let board, current, gameOver, vsCPU = false;
    let scores = { X: 0, O: 0, draw: 0 };

    const boardEl    = document.getElementById('board');
    const statusEl   = document.getElementById('status');
    const modeBtn    = document.getElementById('mode-toggle');
    const scoreX     = document.getElementById('score-x');
    const scoreO     = document.getElementById('score-o');
    const scoreDraw  = document.getElementById('score-draw');

    function init() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      render();
      updateStatus();
    }

    function render() {
      boardEl.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ` ${val.toLowerCase()} taken` : '');
        cell.textContent = val;
        cell.addEventListener('click', () => handleClick(i));
        boardEl.appendChild(cell);
      });
    }

    function handleClick(i) {
      if (gameOver || board[i]) return;
      if (vsCPU && current === 'O') return;
      place(i, current);
      if (!gameOver && vsCPU && current === 'O') {
        setTimeout(cpuMove, 350);
      }
    }

    function place(i, player) {
      board[i] = player;
      render();
      const result = checkResult();
      if (result) {
        endGame(result);
      } else {
        current = current === 'X' ? 'O' : 'X';
        updateStatus();
        if (vsCPU && current === 'O' && !gameOver) {
          setTimeout(cpuMove, 350);
        }
      }
    }

    function checkResult() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c])
          return { winner: board[a], line: [a, b, c] };
      }
      if (board.every(v => v)) return { winner: null };
      return null;
    }

    function endGame({ winner, line }) {
      gameOver = true;
      if (winner) {
        scores[winner]++;
        updateScores();
        statusEl.textContent = `${winner} wins!`;
        line.forEach(i => boardEl.children[i].classList.add('win'));
      } else {
        scores.draw++;
        updateScores();
        statusEl.textContent = "It's a draw!";
      }
    }

    function updateStatus() {
      if (!gameOver) {
        const cpuNote = vsCPU && current === 'O' ? ' (CPU thinking…)' : '';
        statusEl.textContent = `${current}'s turn${cpuNote}`;
      }
    }

    function updateScores() {
      scoreX.textContent = scores.X;
      scoreO.textContent = scores.O;
      scoreDraw.textContent = scores.draw;
    }

    function cpuMove() {
      if (gameOver) return;
      let best = -Infinity, move = -1;
      board.forEach((v, i) => {
        if (!v) {
          board[i] = 'O';
          const s = minimax(0, false);
          board[i] = '';
          if (s > best) { best = s; move = i; }
        }
      });
      if (move !== -1) place(move, 'O');
    }

    function minimax(depth, isMax) {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return board[a] === 'O' ? 10 - depth : depth - 10;
        }
      }
      if (board.every(v => v)) return 0;

      if (isMax) {
        let best = -Infinity;
        board.forEach((v, i) => {
          if (!v) { board[i] = 'O'; best = Math.max(best, minimax(depth+1, false)); board[i] = ''; }
        });
        return best;
      } else {
        let best = Infinity;
        board.forEach((v, i) => {
          if (!v) { board[i] = 'X'; best = Math.min(best, minimax(depth+1, true)); board[i] = ''; }
        });
        return best;
      }
    }

    document.getElementById('restart').addEventListener('click', init);

    modeBtn.addEventListener('click', () => {
      vsCPU = !vsCPU;
      modeBtn.textContent = `vs CPU: ${vsCPU ? 'ON' : 'OFF'}`;
      modeBtn.classList.toggle('active', vsCPU);
      init();
    });

    init();
  </script>
</body>
</html>
